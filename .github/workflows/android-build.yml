name: Build Flutter Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: 📦 Install dependencies
        working-directory: app_chat
        run: flutter pub get

      - name: 🏗 Build APK
        working-directory: app_chat
        run: flutter build apk --debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app_chat/build/app/outputs/flutter-apk/app-debug.apk
                
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-v${{ github.run_number }}
          name: Debug Build v${{ github.run_number }}
          draft: false
          prerelease: true
          files: app_chat/build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}