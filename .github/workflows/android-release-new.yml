name: Build Releae APK

on:
  workflow_dispatch:
    inputs:
      upload-tag:
        description: 'Release tag name (e.g., v1.0.0)'
        required: false
        default: ''
      upload-artifact:
        description: 'Upload artifacts to release'
        required: true
        default: 'true'
permissions:
  contents: write   
  
env:
  FLUTTER_VERSION: "3.41.7"
  VERSION: "1.0.0"
  NDK_VERSION: "r28c"
  
  # Signing keys (set in GitHub Secrets)
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  ANDROID_ALIAS: "${{ secrets.ANDROID_ALIAS }}"
  ANDROID_KEY_STORE_PASSWORD: "${{ secrets.ANDROID_KEY_STORE_PASSWORD }}"
  ANDROID_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
  
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  TAG_NAME: "${{ inputs.upload-tag }}"

jobs:
  build-flutter-android:
    name: Build Flutter Android APK
    runs-on: ubuntu-24.04
    
    steps:
      # 1. Free disk space
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      # 2. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 3. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Setup NDK
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      # 5. Setup Flutter
      - name: 5-Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
      # 7. Decode Keystore from Secret
      - name: 6-Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app_chat/android/app
          echo "$KEYSTORE_BASE64" | base64 -d > app_chat/android/app/keystore.jks
          echo "KEYSTORE_PATH=app_chat/android/app/keystore.jks" >> $GITHUB_ENV

      # 8. Create key.properties
      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > app_chat/android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          
          echo "✅ key.properties created"
          cat app_chat/android/key.properties
      # 6. Enable Android
      - name: Enable Android
        run: flutter config --enable-android

      # 7. Get Flutter dependencies
      - name: Flutter pub get
        run: |
          cd app_chat
          flutter pub get

      # 8. Copy libc++_shared.so từ NDK (nếu cần)
      # - name: Copy NDK libraries
      #   run: |
      #     # Tạo thư mục jniLibs cho các kiến trúc
      #     mkdir -p flutter/android/app/src/main/jniLibs/arm64-v8a
      #     mkdir -p flutter/android/app/src/main/jniLibs/armeabi-v7a
      #     mkdir -p flutter/android/app/src/main/jniLibs/x86_64
      #     mkdir -p flutter/android/app/src/main/jniLibs/x86
          
      #     # Copy libc++_shared.so cho từng kiến trúc (nếu có librustdesk.so)
      #     # Chỉ chạy nếu file tồn tại, nếu không thì bỏ qua
      #     if [ -f "./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
      #     fi
      #     if [ -f "./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/arm-linux-androideabi/libc++_shared.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
      #     fi
      #     if [ -f "./flutter/android/app/src/main/jniLibs/x86_64/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/x86_64/ 2>/dev/null || true
      #     fi

      # 9. Tăng Gradle memory cho CI
      - name: Configure Gradle
        run: |
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx4g/g" ./flutter/android/gradle.properties 2>/dev/null || true

      # 10. Build APK cho tất cả các kiến trúc
      - name: Build APK
        run: |
          cd app_chat
          flutter build apk --release
          
          # Đổi tên file APK
          # mv build/app/outputs/flutter-apk/app-release.apk ../rustdesk-${{ env.VERSION }}.apk

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-v${{ github.run_number }}
          name: Debug Build v${{ github.run_number }}
          draft: false
          prerelease: true
          files: app_chat/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}