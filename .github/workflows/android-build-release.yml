name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      upload-tag:
        description: 'Release tag name (e.g., v1.0.0)'
        required: false
        default: ''
      upload-artifact:
        description: 'Upload artifacts to release'
        required: true
        default: 'true'

env:
  FLUTTER_VERSION: "3.41.7"
  VERSION: "1.0.0"
  NDK_VERSION: "r28c"
  
  # Signing keys (set in GitHub Secrets)
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  ANDROID_ALIAS: "${{ secrets.ANDROID_ALIAS }}"
  ANDROID_KEY_STORE_PASSWORD: "${{ secrets.ANDROID_KEY_STORE_PASSWORD }}"
  ANDROID_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
  
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  TAG_NAME: "${{ inputs.upload-tag }}"

jobs:
  build-flutter-android:
    name: Build Flutter Android APK
    runs-on: ubuntu-24.04
    
    steps:
      # 1. Free disk space
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      # 2. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 3. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Setup NDK
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      # 5. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # 6. Enable Android
      - name: Enable Android
        run: flutter config --enable-android

      # 7. Get Flutter dependencies
      - name: Flutter pub get
        run: |
          cd app_chat
          flutter pub get

      # 8. Copy libc++_shared.so từ NDK (nếu cần)
      # - name: Copy NDK libraries
      #   run: |
      #     # Tạo thư mục jniLibs cho các kiến trúc
      #     mkdir -p flutter/android/app/src/main/jniLibs/arm64-v8a
      #     mkdir -p flutter/android/app/src/main/jniLibs/armeabi-v7a
      #     mkdir -p flutter/android/app/src/main/jniLibs/x86_64
      #     mkdir -p flutter/android/app/src/main/jniLibs/x86
          
      #     # Copy libc++_shared.so cho từng kiến trúc (nếu có librustdesk.so)
      #     # Chỉ chạy nếu file tồn tại, nếu không thì bỏ qua
      #     if [ -f "./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
      #     fi
      #     if [ -f "./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/arm-linux-androideabi/libc++_shared.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
      #     fi
      #     if [ -f "./flutter/android/app/src/main/jniLibs/x86_64/librustdesk.so" ]; then
      #       cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/x86_64/ 2>/dev/null || true
      #     fi

      # 9. Tăng Gradle memory cho CI
      - name: Configure Gradle
        run: |
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx4g/g" ./flutter/android/gradle.properties 2>/dev/null || true

      # 10. Build APK cho tất cả các kiến trúc
      - name: Build APK
        run: |
          cd app_chat
          flutter build apk --release
          
          # Đổi tên file APK
          mv build/app/outputs/flutter-apk/app-release.apk ../rustdesk-${{ env.VERSION }}.apk

      # 11. Build split APKs theo ABI (optional)
      - name: Build split APKs
        run: |
          cd flutter
          flutter build apk --release --split-per-abi
          
          # Đổi tên các file APK
          if [ -f "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" ]; then
            mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ../rustdesk-${{ env.VERSION }}-armv7a.apk
          fi
          if [ -f "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" ]; then
            mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ../rustdesk-${{ env.VERSION }}-arm64-v8a.apk
          fi
          if [ -f "build/app/outputs/flutter-apk/app-x86_64-release.apk" ]; then
            mv build/app/outputs/flutter-apk/app-x86_64-release.apk ../rustdesk-${{ env.VERSION }}-x86_64.apk
          fi

      # 12. Setup sign tool version
      - name: Setup sign tool version
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "ANDROID_SIGN_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo "Last build tool version is: $BUILD_TOOL_VERSION"

      # 13. Sign APK (nếu có signing key)
      - uses: r0adkll/sign-android-release@v1
        name: Sign APK
        if: env.ANDROID_SIGNING_KEY != null && env.ANDROID_SIGNING_KEY != ''
        id: sign-rustdesk
        with:
          releaseDirectory: ./
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          releaseFiles: |
            rustdesk-${{ env.VERSION }}.apk
            *.apk
        env:
          BUILD_TOOLS_VERSION: ${{ env.ANDROID_SIGN_TOOL_VERSION }}

      # 14. Upload unsigned APK as artifact
      - name: Upload unsigned APK artifact
        if: env.UPLOAD_ARTIFACT == 'true' && (env.ANDROID_SIGNING_KEY == null || env.ANDROID_SIGNING_KEY == '')
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-unsigned
          path: |
            rustdesk-${{ env.VERSION }}.apk
            rustdesk-${{ env.VERSION }}-*.apk

      # 15. Upload signed APK as artifact
      - name: Upload signed APK artifact
        if: env.UPLOAD_ARTIFACT == 'true' && env.ANDROID_SIGNING_KEY != null && env.ANDROID_SIGNING_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-signed
          path: ${{ steps.sign-rustdesk.outputs.signedReleaseFile }}

      # 16. Create GitHub Release (nếu có tag)
      - name: Create GitHub Release
        if: env.UPLOAD_ARTIFACT == 'true' && env.TAG_NAME != null && env.TAG_NAME != ''
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          name: "RustDesk Android ${{ env.TAG_NAME }}"
          body: |
            ## 📱 RustDesk for Android
            
            ### 📦 Downloads
            - **Universal APK**: `rustdesk-${{ env.VERSION }}.apk`
            - **Split APKs**: arm64-v8a, armeabi-v7a, x86_64
            
            ### 🔧 Installation
            1. Download APK file
            2. Allow "Install from unknown sources"
            3. Open APK to install
            
            ### ⚠️ Note
            This build does NOT include Rust native library (`librustdesk.so`).
            Only Flutter UI layer.
          files: |
            rustdesk-${{ env.VERSION }}.apk
            rustdesk-${{ env.VERSION }}-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}